<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>StockScan — NSE/BSE Screener</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080c10;
    --surface: #0d1117;
    --surface2: #161b22;
    --surface3: #1c2330;
    --border: #21262d;
    --border2: #30363d;
    --accent: #00ff88;
    --accent2: #00c4ff;
    --accent3: #ff6b35;
    --red: #ff4757;
    --green: #00ff88;
    --text: #e6edf3;
    --text2: #8b949e;
    --text3: #484f58;
    --glow: 0 0 20px rgba(0,255,136,0.15);
    --glow2: 0 0 20px rgba(0,196,255,0.15);
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  body {
    font-family: 'JetBrains Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Phone shell */
  .phone-shell {
    max-width: 420px;
    margin: 0 auto;
    min-height: 100vh;
    position: relative;
    background: var(--bg);
    overflow: hidden;
  }

  /* Ambient background */
  .ambient {
    position: fixed;
    top: 0; left: 50%;
    transform: translateX(-50%);
    width: 420px;
    height: 100vh;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .ambient::before {
    content: '';
    position: absolute;
    top: -100px; left: -80px;
    width: 300px; height: 300px;
    background: radial-gradient(circle, rgba(0,255,136,0.04) 0%, transparent 70%);
    border-radius: 50%;
  }
  .ambient::after {
    content: '';
    position: absolute;
    top: 200px; right: -80px;
    width: 250px; height: 250px;
    background: radial-gradient(circle, rgba(0,196,255,0.04) 0%, transparent 70%);
    border-radius: 50%;
  }

  /* Status bar */
  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 20px 6px;
    font-size: 11px;
    color: var(--text2);
    font-weight: 500;
    position: relative;
    z-index: 10;
  }
  .status-right { display:flex; gap:6px; align-items:center; }
  .signal-bars { display:flex; gap:2px; align-items:flex-end; height:12px; }
  .signal-bars span {
    width:3px; background:var(--text2); border-radius:1px;
    animation: signalPulse 2s ease-in-out infinite;
  }
  .signal-bars span:nth-child(1) { height:4px; }
  .signal-bars span:nth-child(2) { height:7px; animation-delay:0.2s; }
  .signal-bars span:nth-child(3) { height:10px; animation-delay:0.4s; }
  .signal-bars span:nth-child(4) { height:12px; animation-delay:0.6s; }
  @keyframes signalPulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* Header */
  .header {
    padding: 8px 20px 12px;
    position: relative;
    z-index: 10;
    animation: slideDown 0.5s ease both;
  }
  @keyframes slideDown { from{opacity:0;transform:translateY(-20px)} to{opacity:1;transform:translateY(0)} }

  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }
  .logo span { color: var(--accent); }

  .header-actions { display:flex; gap:10px; }

  .icon-btn {
    width: 36px; height: 36px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 16px;
    color: var(--text2);
  }
  .icon-btn:hover, .icon-btn:active { background:var(--surface3); border-color:var(--border2); color:var(--text); transform:scale(0.95); }

  /* Market ticker strip */
  .ticker-strip {
    background: var(--surface);
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    padding: 8px 0;
    overflow: hidden;
    position: relative;
    z-index: 10;
    animation: slideDown 0.5s 0.1s ease both;
  }
  .ticker-inner {
    display: flex;
    gap: 32px;
    animation: tickerScroll 20s linear infinite;
    white-space: nowrap;
    width: max-content;
  }
  @keyframes tickerScroll {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }
  .ticker-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
  }
  .ticker-name { color: var(--text2); font-weight: 500; }
  .ticker-val { color: var(--text); font-weight: 600; }
  .ticker-chg { font-size: 10px; }
  .up { color: var(--green); }
  .dn { color: var(--red); }

  /* Search bar */
  .search-wrap {
    padding: 14px 20px 0;
    position: relative;
    z-index: 10;
    animation: fadeUp 0.5s 0.15s ease both;
  }
  @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

  .search-bar {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    transition: border-color 0.2s;
  }
  .search-bar:focus-within { border-color: var(--accent); box-shadow: 0 0 0 1px rgba(0,255,136,0.1); }
  .search-bar input {
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    flex: 1;
  }
  .search-bar input::placeholder { color: var(--text3); }
  .search-icon { color: var(--text3); font-size: 15px; }

  /* Section label */
  .section-label {
    padding: 16px 20px 8px;
    font-size: 10px;
    font-weight: 600;
    color: var(--text3);
    letter-spacing: 2px;
    text-transform: uppercase;
    position: relative;
    z-index: 10;
  }

  /* Active filters row */
  .active-filters-row {
    padding: 0 20px 12px;
    display: flex;
    gap: 8px;
    overflow-x: auto;
    scrollbar-width: none;
    position: relative;
    z-index: 10;
    animation: fadeUp 0.5s 0.2s ease both;
  }
  .active-filters-row::-webkit-scrollbar { display:none; }

  .filter-chip {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 20px;
    padding: 6px 12px;
    font-size: 11px;
    white-space: nowrap;
    cursor: pointer;
    transition: all 0.2s;
    animation: chipPop 0.3s ease both;
  }
  @keyframes chipPop { from{opacity:0;transform:scale(0.8)} to{opacity:1;transform:scale(1)} }
  .filter-chip.active {
    background: rgba(0,255,136,0.08);
    border-color: rgba(0,255,136,0.3);
    color: var(--accent);
  }
  .filter-chip.active .chip-op { color: var(--accent2); }
  .filter-chip:hover { transform: scale(0.97); }
  .chip-label { color: var(--text2); }
  .chip-op { color: var(--accent2); font-weight: 600; }
  .chip-val { color: var(--text); font-weight: 600; }
  .chip-del {
    color: var(--text3);
    font-size: 14px;
    line-height: 1;
    margin-left: 2px;
    transition: color 0.15s;
  }
  .chip-del:hover { color: var(--red); }

  .add-filter-chip {
    display: flex;
    align-items: center;
    gap: 6px;
    background: transparent;
    border: 1px dashed var(--border2);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 11px;
    color: var(--text3);
    white-space: nowrap;
    cursor: pointer;
    transition: all 0.2s;
  }
  .add-filter-chip:hover { border-color:var(--accent); color:var(--accent); }

  /* Results */
  .results-header {
    padding: 0 20px 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: relative;
    z-index: 10;
    animation: fadeUp 0.5s 0.25s ease both;
  }
  .results-count { font-size: 12px; color: var(--text2); }
  .results-count strong { color: var(--accent); font-size: 15px; }
  .sort-btn {
    font-size: 11px;
    color: var(--text2);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 5px 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
    transition: all 0.2s;
  }
  .sort-btn:hover { border-color: var(--border2); color: var(--text); }

  /* Stock cards */
  .stocks-list {
    padding: 0 20px 100px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    position: relative;
    z-index: 10;
  }

  .stock-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 14px 16px;
    cursor: pointer;
    transition: all 0.25s;
    animation: fadeUp 0.4s ease both;
    position: relative;
    overflow: hidden;
  }
  .stock-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .stock-card:hover, .stock-card:active {
    border-color: var(--border2);
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  }
  .stock-card:hover::before { opacity: 1; }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 10px;
  }
  .stock-info {}
  .stock-symbol {
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 0.3px;
  }
  .stock-name { font-size: 10px; color: var(--text3); margin-top: 2px; }
  .stock-sector {
    display: inline-block;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px 6px;
    font-size: 9px;
    color: var(--text3);
    margin-top: 4px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .stock-price-block { text-align: right; }
  .stock-price {
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
  }
  .stock-chg {
    font-size: 11px;
    margin-top: 2px;
    font-weight: 500;
  }

  .card-metrics {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
  }
  .metric {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .metric-label { font-size: 9px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; }
  .metric-val { font-size: 12px; color: var(--text); font-weight: 500; }
  .metric-val.highlight { color: var(--accent); }
  .metric-val.warn { color: var(--accent3); }

  /* Mini sparkline */
  .sparkline-wrap {
    height: 30px;
    margin: 8px 0 0;
  }
  .sparkline-wrap svg { width: 100%; height: 100%; }

  /* Bottom nav */
  .bottom-nav {
    position: fixed;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 420px;
    background: rgba(8,12,16,0.95);
    backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-around;
    padding: 10px 0 20px;
    z-index: 100;
  }
  .nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    cursor: pointer;
    transition: all 0.2s;
    padding: 4px 20px;
  }
  .nav-item:active { transform: scale(0.9); }
  .nav-icon { font-size: 20px; }
  .nav-label { font-size: 9px; color: var(--text3); letter-spacing: 0.5px; }
  .nav-item.active .nav-icon { filter: drop-shadow(0 0 6px var(--accent)); }
  .nav-item.active .nav-label { color: var(--accent); }

  /* ==== FILTER PANEL (bottom sheet) ==== */
  .sheet-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .sheet-overlay.open { opacity: 1; pointer-events: all; }

  .filter-sheet {
    position: fixed;
    bottom: 0; left: 50%;
    transform: translateX(-50%) translateY(100%);
    width: 420px;
    max-height: 90vh;
    background: var(--surface);
    border-top: 1px solid var(--border);
    border-radius: 24px 24px 0 0;
    z-index: 201;
    transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1);
    display: flex;
    flex-direction: column;
  }
  .filter-sheet.open { transform: translateX(-50%) translateY(0); }

  .sheet-handle-wrap {
    display: flex;
    justify-content: center;
    padding: 12px 0 0;
  }
  .sheet-handle {
    width: 36px; height: 4px;
    background: var(--border2);
    border-radius: 2px;
  }

  .sheet-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 20px 10px;
    border-bottom: 1px solid var(--border);
  }
  .sheet-title {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 700;
  }
  .sheet-close {
    width: 30px; height: 30px;
    background: var(--surface2);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 16px;
    color: var(--text2);
    transition: all 0.2s;
  }
  .sheet-close:hover { background: var(--surface3); color: var(--red); }

  /* Filter category tabs */
  .cat-tabs {
    display: flex;
    gap: 0;
    overflow-x: auto;
    scrollbar-width: none;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
  }
  .cat-tabs::-webkit-scrollbar { display: none; }
  .cat-tab {
    padding: 6px 14px;
    font-size: 11px;
    color: var(--text3);
    cursor: pointer;
    border-radius: 20px;
    white-space: nowrap;
    transition: all 0.2s;
    flex-shrink: 0;
    font-weight: 500;
    letter-spacing: 0.3px;
  }
  .cat-tab.active {
    background: rgba(0,255,136,0.1);
    color: var(--accent);
    font-weight: 600;
  }

  /* Filter items list */
  .filter-list {
    overflow-y: auto;
    flex: 1;
    padding: 8px 0;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .filter-group-label {
    padding: 12px 20px 6px;
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text3);
    font-weight: 600;
  }

  .filter-item {
    display: flex;
    align-items: center;
    padding: 12px 20px;
    cursor: pointer;
    transition: background 0.15s;
    border-radius: 0;
    gap: 12px;
  }
  .filter-item:hover, .filter-item:active { background: var(--surface2); }
  .filter-item.selected { background: rgba(0,255,136,0.04); }

  .filter-item-icon {
    width: 34px; height: 34px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
    transition: all 0.2s;
  }
  .filter-item.selected .filter-item-icon {
    background: rgba(0,255,136,0.1);
    border-color: rgba(0,255,136,0.3);
  }

  .filter-item-info { flex: 1; }
  .filter-item-name { font-size: 13px; color: var(--text); font-weight: 500; }
  .filter-item-desc { font-size: 10px; color: var(--text3); margin-top: 2px; }

  .filter-item-badge {
    font-size: 9px;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }
  .badge-val { background: rgba(0,255,136,0.1); color: var(--accent); border: 1px solid rgba(0,255,136,0.2); }
  .badge-add { background: var(--surface2); color: var(--text3); border: 1px solid var(--border); }

  /* ==== VALUE ENTRY PANEL ==== */
  .value-sheet {
    position: fixed;
    bottom: 0; left: 50%;
    transform: translateX(-50%) translateY(100%);
    width: 420px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    border-radius: 24px 24px 0 0;
    z-index: 202;
    transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
    padding-bottom: 30px;
  }
  .value-sheet.open { transform: translateX(-50%) translateY(0); }

  .vs-header {
    padding: 20px 20px 14px;
    border-bottom: 1px solid var(--border);
  }
  .vs-filter-name {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .vs-filter-desc { font-size: 11px; color: var(--text3); }

  /* Operator selector */
  .op-selector {
    display: flex;
    gap: 8px;
    padding: 16px 20px;
  }
  .op-btn {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 8px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'JetBrains Mono', monospace;
  }
  .op-btn:active { transform: scale(0.95); }
  .op-symbol {
    font-size: 20px;
    font-weight: 700;
    display: block;
    line-height: 1;
    margin-bottom: 4px;
  }
  .op-label { font-size: 9px; color: var(--text3); letter-spacing: 0.5px; text-transform: uppercase; }

  .op-btn.active.gt { background: rgba(0,255,136,0.08); border-color: rgba(0,255,136,0.4); }
  .op-btn.active.gt .op-symbol { color: var(--green); }
  .op-btn.active.lt { background: rgba(255,71,87,0.08); border-color: rgba(255,71,87,0.4); }
  .op-btn.active.lt .op-symbol { color: var(--red); }
  .op-btn.active.eq { background: rgba(0,196,255,0.08); border-color: rgba(0,196,255,0.4); }
  .op-btn.active.eq .op-symbol { color: var(--accent2); }
  .op-btn.active.between { background: rgba(255,107,53,0.08); border-color: rgba(255,107,53,0.4); }
  .op-btn.active.between .op-symbol { color: var(--accent3); }

  /* Value input display */
  .value-display {
    margin: 0 20px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 14px;
    padding: 16px 20px;
    display: flex;
    align-items: baseline;
    gap: 4px;
    min-height: 64px;
    transition: border-color 0.2s;
  }
  .value-display.active { border-color: var(--accent); box-shadow: 0 0 0 1px rgba(0,255,136,0.1); }
  .val-op-display {
    font-size: 22px;
    font-weight: 700;
    color: var(--accent);
    margin-right: 6px;
    min-width: 24px;
  }
  .val-number {
    font-size: 28px;
    font-weight: 600;
    color: var(--text);
    flex: 1;
    font-family: 'Syne', sans-serif;
  }
  .val-cursor {
    width: 2px; height: 28px;
    background: var(--accent);
    animation: blink 1s step-end infinite;
    margin-left: 2px;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  .val-unit { font-size: 12px; color: var(--text3); align-self: center; }

  /* Preset values */
  .presets-label {
    padding: 14px 20px 8px;
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text3);
    font-weight: 600;
  }
  .presets-row {
    display: flex;
    gap: 8px;
    padding: 0 20px 12px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .presets-row::-webkit-scrollbar { display: none; }
  .preset-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 11px;
    color: var(--text2);
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
    font-family: 'JetBrains Mono', monospace;
  }
  .preset-btn:hover, .preset-btn:active { background: var(--surface3); color: var(--text); border-color: var(--border2); }

  /* Number pad */
  .numpad {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    padding: 0 20px 16px;
  }
  .numpad-key {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 14px;
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.1s;
    user-select: none;
    font-family: 'Syne', sans-serif;
  }
  .numpad-key:active { transform: scale(0.93); background: var(--surface3); }
  .numpad-key.key-zero { }
  .numpad-key.key-dot { font-size: 22px; font-weight: 700; }
  .numpad-key.key-del {
    font-size: 16px;
    color: var(--text2);
  }

function buildSparkline(vals, up) {
  const w = 340, h = 28;
  const min = Math.min(...vals), max = Math.max(...vals);
  const range = max - min || 1;
  const pts = vals.map((v, i) => {
    const x = (i / (vals.length - 1)) * w;
    const y = h - ((v - min) / range) * (h - 4) - 2;
    return `${x},${y}`;
  });
  const color = up ? '#00ff88' : '#ff4757';
  const fill = up ? 'rgba(0,255,136,0.06)' : 'rgba(255,71,87,0.06)';
  const polyFill = `${pts[0].split(',')[0]},${h} ` + pts.join(' ') + ` ${pts[pts.length-1].split(',')[0]},${h}`;
  return `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <polygon points="${polyFill}" fill="${fill}"/>
    <polyline points="${pts.join(' ')}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="${pts[pts.length-1].split(',')[0]}" cy="${pts[pts.length-1].split(',')[1]}" r="2.5" fill="${color}"/>
  </svg>`;
}

  const addBtn = `<div class="add-filter-chip" onclick="openFilterSheet()">＋ Add Filter</div>`;
  const chips = Object.entries(activeFilters).map(([id, f]) => {
    const opSym = f.op === '>' ? '&gt;' : f.op === '<' ? '&lt;' : f.op;
    return `
      <div class="filter-chip active" onclick="reopenFilter('${id}')">
        <span class="chip-label">${f.name}</span>
        <span class="chip-op">${opSym}</span>
        <span class="chip-val">${f.val}${f.unit ? f.unit : ''}</span>
        <span class="chip-del" onclick="event.stopPropagation();removeFilter('${id}')">✕</span>
      </div>
    `;
  }).join('');
  row.innerHTML = addBtn + chips;
  document.getElementById('resultCount').textContent = Math.max(12, 847 - Object.keys(activeFilters).length * 94);
}

function removeFilter(id) {
  delete activeFilters[id];
  renderActiveChips();
  renderFilterList();
  renderStocks();
  showToast('Filter removed');
}

function reopenFilter(id) {
  // find category
  for (const [cat, filters] of Object.entries(allFilters)) {
    const f = filters.find(x => x.id === id);
    if (f) { activeCat = cat; openValueSheet(id, cat); return; }
  }
}

// ==================== SHEETS ====================

function openFilterSheet() {
  document.getElementById('sheetOverlay').classList.add('open');
  document.getElementById('filterSheet').classList.add('open');
  document.getElementById('valueSheet').classList.remove('open');
}

function closeFilterSheet() {
  document.getElementById('sheetOverlay').classList.remove('open');
  document.getElementById('filterSheet').classList.remove('open');
  document.getElementById('valueSheet').classList.remove('open');
}

function openValueSheet(filterId, cat) {
  const filters = allFilters[cat];
  const filter = filters.find(f => f.id === filterId);
  if (!filter) return;

  currentFilterId = filterId;
  currentOp = activeFilters[filterId]?.op || '>';
  currentValue = activeFilters[filterId]?.val || '0';

  document.getElementById('vsFilterName').textContent = filter.name;
  document.getElementById('vsFilterDesc').textContent = filter.desc;
  document.getElementById('valUnit').textContent = filter.unit || '';

  // Update operator UI
  document.querySelectorAll('.op-btn').forEach(b => b.classList.remove('active'));
  const opMap = { '>':'gt', '<':'lt', '=':'eq', '~':'between' };
  const opEl = document.querySelector(`.op-btn.${opMap[currentOp]}`);
  if (opEl) opEl.classList.add('active');
  updateValDisplay();

  // Presets
  const presetsEl = document.getElementById('presetsRow');
  presetsEl.innerHTML = filter.presets.map(p => `
    <div class="preset-btn" onclick="setPreset('${p}')">${p}${filter.unit ? ' '+filter.unit : ''}</div>
  `).join('');

  document.getElementById('valueSheet').classList.add('open');
  document.getElementById('filterSheet').classList.remove('open');
  document.getElementById('sheetOverlay').classList.add('open');
}

function updateValDisplay() {
  const opMap = { '>':'&gt;', '<':'&lt;', '=':'=', '~':'⇔' };
  const colorMap = { '>':'var(--green)', '<':'var(--red)', '=':'var(--accent2)', '~':'var(--accent3)' };
  const el = document.getElementById('valOpDisplay');
  el.innerHTML = opMap[currentOp] || currentOp;
  el.style.color = colorMap[currentOp] || 'var(--accent)';
  document.getElementById('valNumber').textContent = currentValue || '0';
}

function selectOp(el, op) {
  document.querySelectorAll('.op-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  currentOp = op;
  updateValDisplay();
}

function numInput(char) {
  if (currentValue === '0' && char !== '.') {
    currentValue = char;
  } else if (char === '.' && currentValue.includes('.')) {
    return;
  } else {
    if (currentValue.length < 10) currentValue += char;
  }
  updateValDisplay();
  // Pulse
  const display = document.getElementById('valueDisplay');
  display.style.borderColor = 'var(--accent)';
  setTimeout(() => display.style.borderColor = '', 300);
}

function numDel() {
  if (currentValue.length <= 1) { currentValue = '0'; }
  else { currentValue = currentValue.slice(0, -1); }
  updateValDisplay();
}

function setPreset(val) {
  currentValue = val;
  updateValDisplay();
  // pulse effect
  document.querySelectorAll('.preset-btn').forEach(b => {
    if (b.textContent.startsWith(val)) {
      b.style.background = 'rgba(0,255,136,0.15)';
      b.style.borderColor = 'rgba(0,255,136,0.4)';
      b.style.color = 'var(--accent)';
      setTimeout(() => { b.style.background=''; b.style.borderColor=''; b.style.color=''; }, 400);
    }
  });
}

function applyFilter() {
  if (!currentFilterId) return;
  // Find filter info
  let filter = null;
  for (const filters of Object.values(allFilters)) {
    const f = filters.find(x => x.id === currentFilterId);
    if (f) { filter = f; break; }
  }
  if (!filter) return;

  activeFilters[currentFilterId] = {
    id: currentFilterId,
    name: filter.name,
    op: currentOp,
    val: currentValue,
    unit: filter.unit || '',
  };

  closeFilterSheet();
  renderActiveChips();
  renderFilterList();
  renderStocks();
  showToast(`${filter.name} ${currentOp} ${currentValue}${filter.unit ? ' '+filter.unit : ''} applied ✓`);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

init();
</script>
</body>
</html>
